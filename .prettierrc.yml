# Prettier配置 - 统一代码格式化规则
# https://prettier.io/docs/en/options.html

# 基本格式化选项
printWidth: 100
tabWidth: 2
useTabs: false
semi: true
singleQuote: true
quoteProps: as-needed
jsxSingleQuote: false
trailingComma: 'es5'
bracketSpacing: true
bracketSameLine: false
arrowParens: always
endOfLine: lf

# 插件配置
plugins:
  - '@trivago/prettier-plugin-sort-imports'

# 导入排序配置
importOrder:
  - '^react$'
  - '^react-(.*)$'
  - '^@/(.*)$'
  - '^@presentation/(.*)$'
  - '^@domain/(.*)$'
  - '^@data/(.*)$'
  - '^@shared/(.*)$'
  - '^@core/(.*)$'
  - '^[./]'
  - '^(.*)$'
importOrderSeparation: true
importOrderSortSpecifiers: true
importOrderCaseInsensitive: true

# 特定文件类型的配置
overrides:
  # JSON文件
  - files: '*.json'
    options:
      tabWidth: 2
      printWidth: 200

  # YAML文件
  - files: '*.{yml,yaml}'
    options:
      tabWidth: 2
      singleQuote: false

  # Markdown文件
  - files: '*.md'
    options:
      printWidth: 80
      proseWrap: always
      singleQuote: false

  # TypeScript文件
  - files: '*.ts'
    options:
      parser: typescript

  # TypeScript React文件
  - files: '*.tsx'
    options:
      parser: typescript

  # CSS文件
  - files: '*.css'
    options:
      singleQuote: false
