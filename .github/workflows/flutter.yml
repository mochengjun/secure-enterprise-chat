# ============================================================
# Flutter CI/CD Workflow
# Build Android APK, iOS IPA, Web
# ============================================================

name: Flutter CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/flutter_app/**'
      - '.github/workflows/flutter.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/flutter_app/**'
  release:
    types: [published]

env:
  FLUTTER_VERSION: '3.19.0'
  JAVA_VERSION: '17'

jobs:
  # ============================================================
  # Analyze & Test
  # ============================================================
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          file: apps/flutter_app/coverage/lcov.info
          flags: flutter
          name: flutter-coverage

  # ============================================================
  # Build Android
  # ============================================================
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/flutter_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > android/app/keystore.jks
          echo "storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=keystore.jks" >> android/key.properties
        if: github.event_name == 'release'

      - name: Build APK (Debug)
        run: flutter build apk --debug
        if: github.event_name != 'release'

      - name: Build APK (Release)
        run: flutter build apk --release
        if: github.event_name == 'release'

      - name: Build App Bundle (Release)
        run: flutter build appbundle --release
        if: github.event_name == 'release'

      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: apps/flutter_app/build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Upload AAB
        uses: actions/upload-artifact@v6
        with:
          name: android-aab
          path: apps/flutter_app/build/app/outputs/bundle/release/*.aab
          retention-days: 14
        if: github.event_name == 'release'

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.example.secchat
          releaseFiles: apps/flutter_app/build/app/outputs/bundle/release/*.aab
          track: internal
          status: completed
        if: github.event_name == 'release'

  # ============================================================
  # Build iOS
  # ============================================================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/flutter_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Setup code signing
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        if: github.event_name == 'release'

      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v5
        with:
          bundle-id: com.example.secchat
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        if: github.event_name == 'release'

      - name: Build iOS (Debug)
        run: flutter build ios --debug --no-codesign
        if: github.event_name != 'release'

      - name: Build iOS (Release)
        run: flutter build ios --release
        if: github.event_name == 'release'

      - name: Build IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload
          zip -r ../../../SecChat.ipa Payload
        if: github.event_name == 'release'

      - name: Upload IPA
        uses: actions/upload-artifact@v6
        with:
          name: ios-ipa
          path: apps/flutter_app/SecChat.ipa
          retention-days: 14
        if: github.event_name == 'release'

      - name: Upload to App Store Connect
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: apps/flutter_app/SecChat.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}
        if: github.event_name == 'release'

  # ============================================================
  # Build Web
  # ============================================================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: analyze
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: apps/flutter_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --web-renderer canvaskit

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-build
          path: apps/flutter_app/build/web
          retention-days: 14

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/flutter_app/build/web
          destination_dir: app
        if: github.event_name == 'release'
