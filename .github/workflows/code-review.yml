name: 🔍 自动化代码自查

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  # ==================== 代码质量检查 ====================
  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🟢 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web-client/package-lock.json
            package-lock.json
      
      - name: 📦 安装依赖
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm ci
            cd ..
          fi
          if [ -f package.json ]; then
            npm ci
          fi
      
      - name: 🔍 运行ESLint
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm run lint --if-present
            cd ..
          fi
        continue-on-error: true
      
      - name: 🎨 检查代码格式
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm run format:check --if-present
            cd ..
          fi
        continue-on-error: true
      
      - name: 📝 TypeScript类型检查
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm run type-check --if-present
            cd ..
          fi

  # ==================== 单元测试 ====================
  unit-tests:
    name: 单元测试
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🟢 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📦 安装依赖
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm ci
            cd ..
          fi
      
      - name: ✅ 运行测试
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm test -- --coverage --reporters=default --reporters=jest-junit
            cd ..
          fi
      
      - name: 📊 上传覆盖率报告
        uses: codecov/codecov-action@v3
        with:
          files: ./web-client/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: 📄 发布测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            web-client/junit.xml
            web-client/coverage/

  # ==================== Flutter测试 ====================
  flutter-tests:
    name: Flutter测试
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🎯 设置Flutter环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
          cache-key: flutter-${{ runner.OS }}-3.16.0
          cache-path: ${{ runner.tool_cache }}/flutter
      
      - name: 📦 安装依赖
        run: |
          if [ -d "secure-enterprise-chat/apps/flutter_app" ]; then
            cd secure-enterprise-chat/apps/flutter_app
            flutter pub get
            cd -
          fi
      
      - name: 🔍 Dart静态分析
        run: |
          if [ -d "secure-enterprise-chat/apps/flutter_app" ]; then
            cd secure-enterprise-chat/apps/flutter_app
            dart analyze --fatal-infos --fatal-warnings
            cd -
          fi
      
      - name: ✅ 运行Flutter测试
        run: |
          if [ -d "secure-enterprise-chat/apps/flutter_app" ]; then
            cd secure-enterprise-chat/apps/flutter_app
            flutter test --coverage --machine > test-results.json
            cd -
          fi
      
      - name: 📊 上传覆盖率
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./secure-enterprise-chat/apps/flutter_app/coverage/lcov.info
          flags: flutter
          name: flutter-coverage
          fail_ci_if_error: false

  # ==================== 安全扫描 ====================
  security-scan:
    name: 安全扫描
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🟢 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📦 安装依赖
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm ci
            cd ..
          fi
      
      - name: 🔒 NPM安全审计
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm audit --audit-level=moderate
            cd ..
          fi
        continue-on-error: true
      
      - name: 🛡️ 运行Snyk安全检查
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
      
      - name: 🔐 私钥检测
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --debug --only-verified

  # ==================== 依赖检查 ====================
  dependency-review:
    name: 依赖审查
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 📦 依赖审查
        uses: actions/dependency-review-action@v3
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause

  # ==================== SonarQube分析 ====================
  sonarqube:
    name: SonarQube分析
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔍 SonarQube扫描
        uses: sonarsource/sonarqube-scan-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.event.repository.name }}
            -Dsonar.projectName=${{ github.event.repository.name }}
            -Dsonar.sources=src,secure-enterprise-chat/apps/flutter_app/lib
            -Dsonar.sourceEncoding=UTF-8
            -Dsonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/test/**,**/tests/**

  # ==================== 代码复杂度分析 ====================
  complexity-analysis:
    name: 代码复杂度分析
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 🟢 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: 📊 安装复杂度分析工具
        run: npm install -g escomplex
      
      - name: 🔍 分析代码复杂度
        run: |
          if [ -d "web-client/src" ]; then
            cd web-client
            escomplex src -o complexity-report.json || true
            cd ..
          fi
      
      - name: 📄 发布复杂度报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: complexity-report
          path: complexity-report.json

  # ==================== 生成报告 ====================
  generate-report:
    name: 生成综合报告
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, security-scan]
    if: always()
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
      
      - name: 📊 收集检查结果
        run: |
          echo "## 🔍 代码自查报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ 检查项" >> $GITHUB_STEP_SUMMARY
          echo "- [x] 代码质量检查" >> $GITHUB_STEP_SUMMARY
          echo "- [x] 单元测试" >> $GITHUB_STEP_SUMMARY
          echo "- [x] 安全扫描" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "详细信息请查看各Job的执行结果" >> $GITHUB_STEP_SUMMARY
      
      - name: 📧 发送通知（失败时）
        if: failure()
        run: |
          echo "代码自查失败，请检查以上错误信息"

  # ==================== 自动修复（可选） ====================
  auto-fix:
    name: 自动修复代码问题
    runs-on: ubuntu-latest
    needs: [code-quality]
    if: failure() && github.event_name == 'pull_request'
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 🟢 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📦 安装依赖
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm ci
            cd ..
          fi
      
      - name: 🔧 自动修复ESLint问题
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm run lint:fix --if-present
            cd ..
          fi
      
      - name: 🎨 格式化代码
        run: |
          if [ -f web-client/package.json ]; then
            cd web-client
            npm run format --if-present
            cd ..
          fi
      
      - name: 📤 提交修复
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-fix code issues"
          git push
