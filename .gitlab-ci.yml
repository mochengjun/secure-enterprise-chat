# GitLab CI/CD配置 - 自动化代码自查流水线
# 支持多语言、多阶段的代码质量检查

# 定义阶段
stages:
  - lint
  - test
  - security
  - quality
  - build

# 全局变量
variables:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  FLUTTER_VERSION: "3.16.0"
  # 性能优化：使用缓存
  CACHE_KEY: "${CI_COMMIT_REF_SLUG}"
  # 配置并发
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fast"

# ==================== 缓存配置 ====================
.node_cache: &node_cache
  key: "${CACHE_KEY}-node"
  paths:
    - node_modules/
    - web-client/node_modules/
  policy: pull

.python_cache: &python_cache
  key: "${CACHE_KEY}-python"
  paths:
    - venv/
    - .pip-cache/
  policy: pull

.flutter_cache: &flutter_cache
  key: "${CACHE_KEY}-flutter"
  paths:
    - secure-enterprise-chat/apps/flutter_app/.dart_tool/
    - secure-enterprise-chat/apps/flutter_app/.packages
    - secure-enterprise-chat/apps/flutter_app/pub-cache/
  policy: pull

# ==================== 代码规范检查 ====================
# TypeScript/JavaScript代码检查
eslint:
  stage: lint
  image: node:${NODE_VERSION}
  cache:
    <<: *node_cache
    policy: pull-push
  before_script:
    - cd web-client
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run lint -- --format gitlab --output-file gl-codequality.json || true
    - npm run lint -- --format stylish
  artifacts:
    reports:
      codequality: web-client/gl-codequality.json
    expire_in: 1 week
    when: always
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# Python代码检查
pylint:
  stage: lint
  image: python:${PYTHON_VERSION}
  cache:
    <<: *python_cache
    policy: pull-push
  before_script:
    - pip install pylint flake8 black isort
    - pip install --cache-dir .pip-cache -r requirements.txt || true
  script:
    - pylint --exit-zero --output-format=gitlab-codeclimate:gl-codequality.json **/*.py || true
    - flake8 --format=gitlabcodeclimate gl-codequality.json || true
  artifacts:
    reports:
      codequality: gl-codequality.json
    expire_in: 1 week
    when: always
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      exists:
        - "**/*.py"

# Dart代码检查
dart-analyze:
  stage: lint
  image: ghcr.io/cirruslabs/flutter:${FLUTTER_VERSION}
  cache:
    <<: *flutter_cache
    policy: pull-push
  before_script:
    - cd secure-enterprise-chat/apps/flutter_app
    - flutter pub get
  script:
    - dart analyze --format=machine | dart analyze --format=json > analysis-results.json || true
    - dart analyze --fatal-infos --fatal-warnings
  artifacts:
    reports:
      codequality: analysis-results.json
    expire_in: 1 week
    when: always
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      exists:
        - "**/*.dart"

# 代码格式化检查
prettier:
  stage: lint
  image: node:${NODE_VERSION}
  cache:
    <<: *node_cache
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run format:check
  allow_failure: true

# ==================== 单元测试 ====================
# Node.js单元测试
node-test:
  stage: test
  image: node:${NODE_VERSION}
  cache:
    <<: *node_cache
  before_script:
    - cd web-client
    - npm ci --cache .npm --prefer-offline
  script:
    - npm test -- --coverage --reporters=default --reporters=jest-junit
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    reports:
      junit: web-client/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: web-client/coverage/cobertura-coverage.xml
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Flutter单元测试
flutter-test:
  stage: test
  image: ghcr.io/cirruslabs/flutter:${FLUTTER_VERSION}
  cache:
    <<: *flutter_cache
  before_script:
    - cd secure-enterprise-chat/apps/flutter_app
    - flutter pub get
  script:
    - flutter test --coverage --machine > test-results.json
    - genhtml coverage/lcov.info -o coverage/html
  coverage: '/lines......:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    reports:
      junit: test-results.json
    paths:
      - secure-enterprise-chat/apps/flutter_app/coverage/html/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      exists:
        - "**/*.dart"

# Python单元测试
python-test:
  stage: test
  image: python:${PYTHON_VERSION}
  cache:
    <<: *python_cache
  before_script:
    - pip install pytest pytest-cov pytest-junit
    - pip install --cache-dir .pip-cache -r requirements.txt || true
  script:
    - pytest --cov=src --cov-report=xml --cov-report=html --junitxml=junit.xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - htmlcov/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      exists:
        - "**/*.py"

# ==================== 安全检查 ====================
# 依赖安全扫描
npm-audit:
  stage: security
  image: node:${NODE_VERSION}
  cache:
    <<: *node_cache
  script:
    - cd web-client
    - npm audit --audit-level=moderate
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# SAST静态应用安全测试
sast:
  stage: security
  include:
    - template: Security/SAST.gitlab-ci.yml
  variables:
    SAST_EXCLUDED_PATHS: spec, test, tests, tmp, node_modules, venv
    SAST_BANDIT_EXCLUDED_PATHS: "*/test/*,*/tests/*,*/node_modules/*"

# 依赖扫描
dependency_scanning:
  stage: security
  include:
    - template: Security/Dependency-Scanning.gitlab-ci.yml

# Secret检测
secret_detection:
  stage: security
  include:
    - template: Security/Secret-Detection.gitlab-ci.yml

# ==================== 代码质量分析 ====================
# SonarQube分析
sonarqube:
  stage: quality
  image: sonarsource/sonar-scanner-cli
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
      -Dsonar.projectKey=${CI_PROJECT_NAME}
      -Dsonar.projectName=${CI_PROJECT_TITLE}
      -Dsonar.projectVersion=${CI_COMMIT_SHORT_SHA}
      -Dsonar.sources=src,secure-enterprise-chat/apps/flutter_app/lib
      -Dsonar.sourceEncoding=UTF-8
      -Dsonar.host.url=${SONAR_URL}
      -Dsonar.login=${SONAR_TOKEN}
      -Dsonar.gitlab.project_id=${CI_PROJECT_ID}
      -Dsonar.gitlab.ref_name=${CI_COMMIT_REF_NAME}
      -Dsonar.gitlab.commit_sha=${CI_COMMIT_SHA}
      -Dsonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/test/**,**/tests/**
  allow_failure: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

# 代码复杂度分析
code_complexity:
  stage: quality
  image: node:${NODE_VERSION}
  cache:
    <<: *node_cache
  before_script:
    - npm install -g escomplex
  script:
    - escomplex web-client/src -o complexity-report.json
  artifacts:
    paths:
      - complexity-report.json
    expire_in: 1 week
  allow_failure: true

# ==================== 构建验证 ====================
# Node.js构建
node-build:
  stage: build
  image: node:${NODE_VERSION}
  cache:
    <<: *node_cache
  before_script:
    - cd web-client
    - npm ci --cache .npm --prefer-offline
  script:
    - npm run build
  artifacts:
    paths:
      - web-client/dist/
      - web-client/build/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'

# Flutter构建
flutter-build:
  stage: build
  image: ghcr.io/cirruslabs/flutter:${FLUTTER_VERSION}
  cache:
    <<: *flutter_cache
  before_script:
    - cd secure-enterprise-chat/apps/flutter_app
    - flutter pub get
  script:
    - flutter build apk --release
    - flutter build ios --release --no-codesign
  artifacts:
    paths:
      - secure-enterprise-chat/apps/flutter_app/build/app/outputs/flutter-apk/
      - secure-enterprise-chat/apps/flutter_app/build/ios/
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  tags:
    - docker

# ==================== 报告生成 ====================
# 生成综合报告
generate-report:
  stage: .post
  image: node:${NODE_VERSION}
  script:
    - |
      echo "📊 代码质量报告"
      echo "==============="
      echo "✅ ESLint检查: 完成"
      echo "✅ 单元测试: 完成"
      echo "✅ 安全扫描: 完成"
      echo "✅ 代码质量分析: 完成"
      echo ""
      echo "详细报告请查看Artifacts"
  artifacts:
    when: always
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
