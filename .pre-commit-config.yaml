# 自动化代码自查系统 - Pre-commit配置
# 支持 TypeScript, JavaScript, Python, Dart, Go 等多种语言

repos:
  # ==================== 通用检查 ====================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: 删除行尾空白字符
      - id: end-of-file-fixer
        name: 确保文件以换行符结尾
      - id: check-yaml
        name: YAML文件语法检查
      - id: check-json
        name: JSON文件语法检查
      - id: check-added-large-files
        name: 检查大文件
        args: ['--maxkb=500']
      - id: check-merge-conflict
        name: 检查合并冲突标记
      - id: check-case-conflict
        name: 检查文件名大小写冲突
      - id: detect-private-key
        name: 检测私钥泄露
      - id: no-commit-to-branch
        name: 禁止直接提交到保护分支
        args: ['--branch', 'main', '--branch', 'master']

  # ==================== EditorConfig ====================
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: '2.7.3'
    hooks:
      - id: editorconfig-checker
        name: EditorConfig格式检查
        alias: ec

  # ==================== TypeScript/JavaScript ====================
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        name: ESLint代码检查
        files: \.[jt]sx?$
        types: [file]
        additional_dependencies:
          - eslint@8.56.0
          - "@typescript-eslint/eslint-plugin@6.19.0"
          - "@typescript-eslint/parser@6.19.0"
          - eslint-plugin-security@2.1.0
          - eslint-plugin-sonarjs@0.23.0

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.2.4
    hooks:
      - id: prettier
        name: Prettier代码格式化
        types_or: [javascript, jsx, ts, tsx, json, css, scss, markdown]
        additional_dependencies:
          - prettier@3.2.4

  # ==================== Python ====================
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Black代码格式化
        language_version: python3.11

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort导入排序
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Flake8代码检查
        additional_dependencies: [
          'flake8-docstrings',
          'flake8-bugbear',
          'flake8-comprehensions',
        ]

  - repo: https://github.com/pycqa/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        name: Bandit安全检查
        args: ['-ll']  # 只报告中高优先级问题

  # ==================== Dart/Flutter ====================
  - repo: local
    hooks:
      - id: dart-format
        name: Dart代码格式化
        entry: bash -c 'cd secure-enterprise-chat/apps/flutter_app && dart format .'
        language: system
        types: [dart]
        pass_filenames: false

      - id: dart-analyze
        name: Dart静态分析
        entry: bash -c 'cd secure-enterprise-chat/apps/flutter_app && dart analyze --fatal-infos'
        language: system
        types: [dart]
        pass_filenames: false

      - id: flutter-test
        name: Flutter单元测试
        entry: bash -c 'cd secure-enterprise-chat/apps/flutter_app && flutter test --no-pub'
        language: system
        types: [dart]
        pass_filenames: false
        stages: [pre-push]

  # ==================== 安全检查 ====================
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: python-safety-dependencies-check
        name: Python依赖安全检查
        files: requirements

  # ==================== Git提交消息 ====================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        name: 提交消息格式检查
        stages: [commit-msg]

  # ==================== 拼写检查 ====================
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.6
    hooks:
      - id: codespell
        name: 拼写错误检查
        types_or: [python, javascript, dart, markdown]
        args: ['--ignore-words-list', 'selectin,connexion']
