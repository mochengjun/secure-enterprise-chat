# AlertManager 配置文件
global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST:-smtp.example.com}:${SMTP_PORT:-587}'
  smtp_from: '${SMTP_FROM:-alertmanager@sec-chat.example.com}'
  smtp_auth_username: '${SMTP_USER:-}'
  smtp_auth_password: '${SMTP_PASSWORD:-}'

# 告警模板
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# 路由配置
route:
  group_by: ['alertname', 'severity', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default-receiver'
  
  routes:
    # 严重告警 - 立即通知
    - match:
        severity: critical
      receiver: 'critical-receiver'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # 安全相关告警
    - match:
        alertname: =~".*Security.*|.*Login.*|.*Suspicious.*"
      receiver: 'security-receiver'
      group_wait: 0s
      repeat_interval: 30m

    # 数据库告警
    - match:
        alertname: =~"Postgres.*|Redis.*"
      receiver: 'database-receiver'

    # 警告级别
    - match:
        severity: warning
      receiver: 'warning-receiver'
      repeat_interval: 12h

# 接收器配置
receivers:
  - name: 'default-receiver'
    webhook_configs:
      - url: '${WEBHOOK_URL:-http://localhost:5001/webhook}'
        send_resolved: true

  - name: 'critical-receiver'
    webhook_configs:
      - url: '${SLACK_CRITICAL_WEBHOOK:-http://localhost:5001/slack/critical}'
        send_resolved: true
    email_configs:
      - to: '${ALERT_EMAIL_TO:-ops@example.com}'
        send_resolved: true
        headers:
          subject: '[CRITICAL] Sec-Chat Alert: {{ .GroupLabels.alertname }}'

  - name: 'security-receiver'
    webhook_configs:
      - url: '${SLACK_SECURITY_WEBHOOK:-http://localhost:5001/slack/security}'
        send_resolved: true
    email_configs:
      - to: '${SECURITY_EMAIL_TO:-security@example.com}'
        send_resolved: true
        headers:
          subject: '[SECURITY] Sec-Chat Alert: {{ .GroupLabels.alertname }}'

  - name: 'database-receiver'
    webhook_configs:
      - url: '${SLACK_DB_WEBHOOK:-http://localhost:5001/slack/database}'
        send_resolved: true
    email_configs:
      - to: '${DBA_EMAIL_TO:-dba@example.com}'
        send_resolved: true
        headers:
          subject: '[DATABASE] Sec-Chat Alert: {{ .GroupLabels.alertname }}'

  - name: 'warning-receiver'
    webhook_configs:
      - url: '${SLACK_WARNING_WEBHOOK:-http://localhost:5001/slack/warning}'
        send_resolved: true

# 抑制规则
inhibit_rules:
  # 如果有 critical 告警,抑制同一 job 的 warning 告警
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job']

  # 如果服务 down,抑制其他相关告警
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: 'High.*|Slow.*'
    equal: ['job']
