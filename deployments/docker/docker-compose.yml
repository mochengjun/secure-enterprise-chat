# ============================================================
# Secure Enterprise Chat - Docker Compose Production Configuration
# ============================================================

services:
  # ============================================================
  # Database: PostgreSQL 16
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: sec-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sec_chat}
      POSTGRES_USER: ${POSTGRES_USER:-sec_chat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sec_chat} -d ${POSTGRES_DB:-sec_chat}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sec-chat-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================================
  # Cache: Redis 7
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: sec-chat-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-change_me_in_production}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change_me_in_production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sec-chat-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ============================================================
  # Object Storage: MinIO (Optional - for media files)
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: sec-chat-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change_me_in_production}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - sec-chat-network
    profiles:
      - with-minio
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ============================================================
  # Main Application: Auth Service (All-in-One)
  # Includes: Auth, Chat, Admin, E2EE, WebRTC, Media, Push
  # ============================================================
  auth-service:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
      args:
        VERSION: ${APP_VERSION:-1.0.0}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: sec-chat/auth-service:${APP_VERSION:-latest}
    container_name: sec-chat-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Server Configuration
      - SERVER_PORT=${API_PORT:-8081}
      - SERVER_MODE=${SERVER_MODE:-release}
      - SERVER_READ_TIMEOUT=${SERVER_READ_TIMEOUT:-30s}
      - SERVER_WRITE_TIMEOUT=${SERVER_WRITE_TIMEOUT:-30s}
      
      # Database
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB:-sec_chat}
      - DATABASE_USER=${POSTGRES_USER:-sec_chat}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-change_me_in_production}
      - DATABASE_SSL_MODE=${DATABASE_SSL_MODE:-disable}
      - DATABASE_MAX_CONNECTIONS=${DATABASE_MAX_CONNECTIONS:-100}
      - DATABASE_MAX_IDLE_CONNECTIONS=${DATABASE_MAX_IDLE_CONNECTIONS:-10}
      
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-change_me_in_production}
      - REDIS_DB=${REDIS_DB:-0}
      
      # JWT
      - JWT_SECRET=${JWT_SECRET:-change_me_in_production_must_be_at_least_32_chars}
      - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-1h}
      - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-168h}
      
      # Security
      - BCRYPT_COST=${BCRYPT_COST:-12}
      - RATE_LIMIT_REQUESTS=${RATE_LIMIT_REQUESTS:-100}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-1m}
      
      # Media Upload
      - UPLOAD_MAX_SIZE=${UPLOAD_MAX_SIZE:-104857600}
      - UPLOAD_ALLOWED_TYPES=${UPLOAD_ALLOWED_TYPES:-image/jpeg,image/png,image/gif,video/mp4,audio/mpeg,application/pdf}
      - UPLOAD_PATH=/app/uploads
      
      # Push Notifications
      - FCM_ENABLED=${FCM_ENABLED:-false}
      - FCM_CREDENTIALS_PATH=/app/keys/firebase.json
      - APNS_ENABLED=${APNS_ENABLED:-false}
      - APNS_KEY_PATH=/app/keys/apns.p8
      - APNS_KEY_ID=${APNS_KEY_ID:-}
      - APNS_TEAM_ID=${APNS_TEAM_ID:-}
      - APNS_BUNDLE_ID=${APNS_BUNDLE_ID:-}
      
      # WebRTC / TURN
      - TURN_SERVER=${TURN_SERVER:-turn:turn.example.com:3478}
      - TURN_USERNAME=${TURN_USERNAME:-}
      - TURN_PASSWORD=${TURN_PASSWORD:-}
      - STUN_SERVER=${STUN_SERVER:-stun:stun.l.google.com:19302}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      - auth_uploads:/app/uploads
      - auth_data:/app/data
      - auth_logs:/app/logs
      - ./keys:/app/keys:ro
    ports:
      - "${API_PORT:-8081}:8081"
    networks:
      - sec-chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
      replicas: 1

  # ============================================================
  # Reverse Proxy: Nginx
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: sec-chat-nginx
    restart: unless-stopped
    depends_on:
      - auth-service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - sec-chat-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ============================================================
  # Scheduled Tasks: Cleanup Service
  # ============================================================
  cleanup:
    build:
      context: ../../services/auth-service
      dockerfile: Dockerfile
    image: sec-chat/auth-service:${APP_VERSION:-latest}
    container_name: sec-chat-cleanup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SERVER_MODE=cleanup
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB:-sec_chat}
      - DATABASE_USER=${POSTGRES_USER:-sec_chat}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-change_me_in_production}
      - CLEANUP_INTERVAL=${CLEANUP_INTERVAL:-1h}
      - MESSAGE_RETENTION_DAYS=${MESSAGE_RETENTION_DAYS:-30}
    networks:
      - sec-chat-network
    profiles:
      - with-cleanup
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  auth_uploads:
    driver: local
  auth_data:
    driver: local
  auth_logs:
    driver: local
  nginx_logs:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  sec-chat-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
