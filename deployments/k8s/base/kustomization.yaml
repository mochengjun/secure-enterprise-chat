# ============================================================
# Secure Enterprise Chat - Kustomization Base
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sec-chat

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres.yaml
  - redis.yaml
  - auth-service.yaml
  - ingress.yaml
  - hpa-and-policies.yaml

commonLabels:
  app.kubernetes.io/part-of: secure-enterprise-chat
  app.kubernetes.io/managed-by: kustomize
