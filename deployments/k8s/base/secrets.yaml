# ============================================================
# Secure Enterprise Chat - Secrets
# IMPORTANT: Use external secret management in production
# (e.g., HashiCorp Vault, AWS Secrets Manager, etc.)
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: sec-chat-secrets
  namespace: sec-chat
  labels:
    app.kubernetes.io/name: sec-chat
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Database Credentials
  # IMPORTANT: Change these values in production!
  DATABASE_USER: "sec_chat"
  DATABASE_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # Redis Password
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  
  # JWT Secret (minimum 32 characters)
  # Generate with: openssl rand -base64 48
  JWT_SECRET: "CHANGE_ME_MUST_BE_AT_LEAST_32_CHARACTERS_LONG_RANDOM_STRING"
  
  # TURN Server Credentials (for WebRTC)
  TURN_SERVER: ""
  TURN_USERNAME: ""
  TURN_PASSWORD: ""
  
  # Push Notification Keys (APNs)
  APNS_KEY_ID: ""
  APNS_TEAM_ID: ""
  APNS_BUNDLE_ID: ""
---
# ============================================================
# PostgreSQL Secrets
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: sec-chat
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: "sec_chat"
  POSTGRES_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
  POSTGRES_DB: "sec_chat"
---
# ============================================================
# Redis Secrets
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: sec-chat
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
type: Opaque
stringData:
  REDIS_PASSWORD: "CHANGE_ME_IN_PRODUCTION"
