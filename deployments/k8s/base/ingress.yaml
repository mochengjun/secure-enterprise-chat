# ============================================================
# Secure Enterprise Chat - Ingress Configuration
# Supports both Nginx Ingress Controller and Traefik
# ============================================================

# Nginx Ingress Controller Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sec-chat-ingress
  namespace: sec-chat
  labels:
    app.kubernetes.io/name: sec-chat
    app.kubernetes.io/component: ingress
  annotations:
    # Nginx Ingress specific
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # SSL/TLS Configuration
    nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
    nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
    
    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    
    # Proxy Settings
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    
    # WebSocket Support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    
    # CORS (if needed)
    nginx.ingress.kubernetes.io/enable-cors: "false"
    
    # cert-manager annotation for automatic TLS
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - chat.example.com
        - api.chat.example.com
      secretName: sec-chat-tls
  rules:
    # Main API Domain
    - host: api.chat.example.com
      http:
        paths:
          # Health Check
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: auth-service-svc
                port:
                  number: 8081
          # API Endpoints
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: auth-service-svc
                port:
                  number: 8081
          # Admin Dashboard
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: auth-service-svc
                port:
                  number: 8081
    # Web Application Domain (if hosting Flutter web)
    - host: chat.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: auth-service-svc
                port:
                  number: 8081
---
# WebSocket Ingress (separate for sticky sessions)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sec-chat-ws-ingress
  namespace: sec-chat
  labels:
    app.kubernetes.io/name: sec-chat
    app.kubernetes.io/component: ingress-websocket
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    
    # WebSocket specific settings
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    
    # Sticky sessions for WebSocket
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "ws-route"
    nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
    
    # WebSocket upgrade headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.chat.example.com
      secretName: sec-chat-tls
  rules:
    - host: api.chat.example.com
      http:
        paths:
          # Chat WebSocket
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: auth-service-svc
                port:
                  number: 8081
          # WebRTC Signaling WebSocket
          - path: /signaling
            pathType: Prefix
            backend:
              service:
                name: auth-service-svc
                port:
                  number: 8081
---
# Certificate (if using cert-manager)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: sec-chat-tls
  namespace: sec-chat
  labels:
    app.kubernetes.io/name: sec-chat
spec:
  secretName: sec-chat-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - chat.example.com
    - api.chat.example.com
  privateKey:
    algorithm: ECDSA
    size: 256
