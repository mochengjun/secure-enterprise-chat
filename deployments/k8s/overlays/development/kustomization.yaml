# ============================================================
# Secure Enterprise Chat - Development Overlay
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sec-chat-dev

resources:
  - ../../base

namePrefix: dev-

commonLabels:
  environment: development

# Patch for development settings
patches:
  # Reduce replicas for development
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  
  # Reduce HPA min replicas
  - target:
      kind: HorizontalPodAutoscaler
      name: auth-service-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
  
  # Reduce resource requests/limits
  - target:
      kind: Deployment
      name: auth-service
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
  
  # Reduce PVC storage sizes
  - target:
      kind: PersistentVolumeClaim
      name: auth-service-uploads
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 5Gi
  
  - target:
      kind: PersistentVolumeClaim
      name: auth-service-data
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 1Gi

# ConfigMap patches for development
configMapGenerator:
  - name: sec-chat-config
    behavior: merge
    literals:
      - SERVER_MODE=debug
      - LOG_LEVEL=debug
      - JWT_ACCESS_EXPIRY=24h

# Development-specific ingress host
patchesJson6902:
  - target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: sec-chat-ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: dev-api.chat.local
      - op: replace
        path: /spec/rules/1/host
        value: dev.chat.local
      - op: replace
        path: /spec/tls/0/hosts/0
        value: dev.chat.local
      - op: replace
        path: /spec/tls/0/hosts/1
        value: dev-api.chat.local
